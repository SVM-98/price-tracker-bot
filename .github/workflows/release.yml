name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build

      - name: Compile i18n catalogs
        run: pybabel compile -d src/price_tracker/locale

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify dist artifacts
        run: |
          ls -la dist/
          test -f dist/price_tracker-*.tar.gz
          test -f dist/price_tracker-*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
