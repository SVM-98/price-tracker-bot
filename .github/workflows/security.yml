name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC weekly

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    # gitleaks-action fetches the PR commits via the API on pull_request events
    # (GET /repos/.../pulls/{n}/commits); that needs pull-requests:read on top of
    # the workflow-level contents:read. Job-level permissions replace the inherited
    # set, so both scopes are listed here.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Bandit static analysis
        run: bandit -r src/ -lll -f json -o bandit-report.json

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OSV scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=./uv.lock

  # NOTE: actions/dependency-review-action was removed — it requires GitHub
  # Advanced Security (Dependency Review API), unavailable on this private repo,
  # so it always failed with "Resource not accessible by integration" on PRs.
  # Dependency CVE scanning is already covered by the osv-scanner job above
  # (scans uv.lock).
