repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        files: ^src/price_tracker/
        additional_dependencies:
          - types-requests
          - types-beautifulsoup4
          - types-python-dateutil
          - tenacity
          - httpx
          - structlog
          - aiosqlite
          - python-telegram-bot
          - prometheus-client

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: [-r, src/, -lll]
        files: ^src/
        pass_filenames: false

  - repo: local
    hooks:
      - id: pybabel-compile-check
        name: pybabel compile (locale .po -> .mo)
        entry: pybabel compile -d src/price_tracker/locale
        language: python
        additional_dependencies: ["babel>=2.13.0"]
        files: ^src/price_tracker/locale/.*\.po$
        pass_filenames: false

      - id: audit-english
        name: English-only audit (src/)
        entry: bash scripts/audit_english.sh
        language: system
        files: ^src/price_tracker/.*\.py$
        pass_filenames: false
