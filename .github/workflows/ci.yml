name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    continue-on-error: ${{ matrix.python-version == '3.13' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile i18n catalogs
        run: pybabel compile -d src/price_tracker/locale

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy strict
        # Reads files = [...] from [tool.mypy] in pyproject.toml.
        # At T24 commit time this is src/price_tracker only; T35 extends
        # to include tests/ (no ci.yml change needed thanks to indirection).
        run: mypy --strict

      - name: pytest with coverage
        run: pytest --cov=src/price_tracker --cov-report=xml --cov-report=term-missing --cov-fail-under=90

      - name: English-only audit
        run: bash scripts/audit_english.sh

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
